name: Bug report
description: Report a reproducible bug in Youshu Web
title: "Bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Youshu Web. Do not include real financial data, secrets, tokens, or private Supabase identifiers.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Auth
        - Dashboard
        - Assets
        - Stocks
        - Metrics
        - Supabase/database
        - Mobile layout
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, device, deployment target, or local setup details.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add screenshots only if they use sample/non-sensitive data.
