name: Feature request
description: Suggest a focused improvement for Youshu Web
title: "Feature: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Assets
        - Stocks
        - Metrics
        - Auth
        - Supabase/database
        - Documentation
        - Developer experience
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: risks
    attributes:
      label: Security or data impact
      description: Note any effect on private financial data, database access, auth, or calculations.
